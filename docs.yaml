openapi: '3.0.3'
info:
  title: Cartify
  description: |
    ## About us
    **Cartify** is a personal e-commerce backend project built with Node.js, Express.js, and MongoDB, focusing on scalability, security, and real-world `API development`. Any website or application can use its _APIs_ to manage products, orders, and e-commerce operations.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
#--------------------------------------------------------------------------
servers:
  - url: http://127.0.0.1:{port}/api/v1
    description: Local server
    variables:
      port:
        default: '8080'
  - url: https://cartify-v1.runasp.net/api/v1
#--------------------------------------------------------------------------
tags:
  - name: Users
    description: Users related operations
  - name: Products
    description: Products related operations
  - name: Categories
    description: Categories related operations
  - name: Wishlist
    description: Wishlist related operations
  - name: Cart
    description: Cart related operations
  - name: Coupons
    description: Coupon related operations
  - name: Orders
    description: Orders related operations
  - name: Reviews
    description: Reviews related operations
  - name: Dashboard
    description: Dashboard related operations
  - name: Paymob
    description: Paymob related operations
#--------------------------------------------------------------------------
security:
  - BasicAuth: []
  - BearerAuth: []
#--------------------------------------------------------------------------
paths:
  /auth/signup:
    post:
      tags: [Users]
      summary: Join our Cartify Family
      description: Creates a new user profile inside the system.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: '#/components/schemas/User/properties/name'
                email:
                  $ref: '#/components/schemas/User/properties/email'
                password:
                  $ref: '#/components/schemas/User/properties/password'
                passwordConfirm:
                  $ref: '#/components/schemas/User/properties/passwordConfirm'
              required: [name, email, password, passwordConfirm]

      responses:
        '201':
          description: User registered successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                oneUserExample:
                  $ref: '#/components/examples/OneUserExample'
        '400':
          $ref: '#/components/responses/badRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/login:
    post:
      tags: [Users]
      summary: Authenticate user credentials
      description: Verifies a user's email and password to start a secure session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  $ref: '#/components/schemas/User/properties/email'
                password:
                  $ref: '#/components/schemas/User/properties/password'
              required: [email, password]
      responses:
        '200':
          description: User logged in successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                loginExample:
                  $ref: '#/components/examples/loginExample'
        '400':
          $ref: '#/components/responses/badRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/forgotPassword:
    post:
      tags: [Users]
      summary: Request a password reset token
      description: Initiates the password recovery process for users who forgot their credentials.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  $ref: '#/components/schemas/User/properties/email'
              required: [email]
      responses:
        '200':
          description: description:Reset token generated and email sent successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Token sent to email!
        '400':
          $ref: '#/components/responses/badRequestError'
        '404':
          $ref: '#/components/responses/notFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/resetPassword/{token}:
    post:
      tags: [Users]
      summary: Reset password using token
      description: Validates the recovery token passed via the URL path and updates the user's password.
      parameters:
        - name: token
          in: path
          required: true
          description: The unhashed reset token received via the user's email link.
          schema:
            type: string
            example: '3b08e5c95cb28fc3b9cb9d88a7822496'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  $ref: '#/components/schemas/User/properties/password'
                passwordConfirm:
                  $ref: '#/components/schemas/User/properties/passwordConfirm'
              required: [password, passwordConfirm]
      responses:
        '200':
          description: Password updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                loginExample:
                  $ref: '#/components/examples/loginExample'
        '400':
          $ref: '#/components/responses/badRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/updatePassword:
    post:
      tags: [Users]
      summary: Update current user password.
      description: Allows an authenticated user to change their account password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                passwordCurrent:
                  type: string
                  format: password
                  minLength: 8
                password:
                  $ref: '#/components/schemas/User/properties/password'
                passwordConfirm:
                  $ref: '#/components/schemas/User/properties/passwordConfirm'
              required: [passwordCurrent, password, passwordConfirm]
      responses:
        '200':
          description: Password updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                loginExample:
                  $ref: '#/components/examples/loginExample'
        '400':
          $ref: '#/components/responses/badRequestError'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/updateProfile:
    patch:
      tags: [Users]
      summary: Update current user profile info
      description: Allows the currently logged-in user to update their basic profile data (e.g., name, email, photo).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  $ref: '#/components/schemas/User/properties/name'
                email:
                  $ref: '#/components/schemas/User/properties/email'
                photo:
                  type: string
                  format: binary
                  description: Upload the main cover image file
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: '#/components/schemas/User/properties/name'
                email:
                  $ref: '#/components/schemas/User/properties/email'
      responses:
        '200':
          description: Profile updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                OneUser:
                  $ref: '#/components/examples/OneUserExample'
        '400':
          $ref: '#/components/responses/badRequestError'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '403':
          $ref: '#/components/responses/forbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/deleteProfile:
    delete:
      tags: [Users]
      summary: Deactivate current user account
      description: Allows the currently logged-in user to deactivate their own account.
      responses:
        '204':
          description: Account successfully deactivated.
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/users:
    get:
      tags:
        - Users
      summary: List all users (Admin Only)
      description: Return the list of all available users
      parameters:
        - name: userId
          in: query
          schema:
            type: string
            example: 6a3d41c0e3435e7e8e68c855
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  result: { type: integer }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
              examples:
                AllUsers:
                  $ref: '#/components/examples/AllUsersExample'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '403':
          $ref: '#/components/responses/forbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/users/{id}:
    get:
      tags: [Users]
      summary: List user details (Admin Only)
      description: Return user details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 6a3d41c0e3435e7e8e68c855
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  data:
                    $ref: '#/components/schemas/User'
              examples:
                OneUser:
                  $ref: '#/components/examples/OneUserExample'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '403':
          $ref: '#/components/responses/forbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  #--------------------------------------------------------------------------
  /products:
    get:
      tags:
        - Products
      summary: List all products
      description: Return the list of products from Cartify
      security: []
      parameters:
        - name: productId
          in: query
          schema:
            type: string
            example: 6a3d41c0e3435e7e8e68c855
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
              examples:
                AllproductsExample:
                  $ref: '#/components/examples/AllproductsExample'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Products]
      summary: add new product (Admin Only)
      description: Post product details to Cartify for demand and supply
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/Product'
                - type: object
                  properties:
                    imageCover:
                      type: string
                      format: binary
                      description: Upload the main cover image file
                    images:
                      type: array
                      items:
                        type: string
                        format: binary
                        description: Upload multiple gallery image files
                  required:
                    [title, description, price, category, imageCover, stock]

      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
              examples:
                oneProductExample:
                  $ref: '#/components/examples/oneProductExample'
        '400':
          $ref: '#/components/responses/badRequestError'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '403':
          $ref: '#/components/responses/forbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: The unique ID of the product
        schema:
          type: string
          example: 6a3d41c0e3435e7e8e68c855
    get:
      tags:
        - Products
      summary: List product details
      description: Return product details
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  data:
                    $ref: '#/components/schemas/Product'
              examples:
                oneProductExample:
                  $ref: '#/components/examples/oneProductExample'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '403':
          $ref: '#/components/responses/forbiddenError'
        '404':
          $ref: '#/components/responses/notFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags: [Products]
      summary: Update product details (Admin Only)
      description: Update product details to Cartify for demand and supply
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/Product'
                - type: object
                  properties:
                    imageCover:
                      type: string
                      format: binary
                      description: Upload the main cover image file
                    images:
                      type: array
                      items:
                        type: string
                        format: binary
                        description: Upload multiple gallery image files
          application/json:
            schema:
              type: object
              properties:
                title:
                  $ref: '#/components/schemas/Product/properties/title'
                description:
                  $ref: '#/components/schemas/Product/properties/description'
                price:
                  $ref: '#/components/schemas/Product/properties/price'
                category:
                  $ref: '#/components/schemas/Product/properties/category'
                stock:
                  $ref: '#/components/schemas/Product/properties/stock'
      responses:
        '200':
          description: Product details updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
              examples:
                OneUser:
                  $ref: '#/components/examples/oneProductExample'
        '400':
          $ref: '#/components/responses/badRequestError'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '403':
          $ref: '#/components/responses/forbiddenError'
        '404':
          $ref: '#/components/responses/notFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Products]
      summary: Delete product (Admin Only)
      description: Delete product details from Cartify
      responses:
        '204':
          description: Product details deleted successfully
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '403':
          $ref: '#/components/responses/forbiddenError'
        '404':
          $ref: '#/components/responses/notFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  #--------------------------------------------------------------------------
  /categories:
    get:
      tags: [Categories]
      summary: Get all categories
      description: Returns a complete list of all product categories available on the platform. Protected by authentication middleware.
      responses:
        '200':
          $ref: '#/components/responses/CategoryListResponse'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '403':
          $ref: '#/components/responses/forbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Categories]
      summary: Add a new category (Admin Only)
      description: Processes form data inputs along with a category banner image file to write a new categorization category to disk.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/Category'
                - type: object
                  properties:
                    image:
                      type: string
                      format: binary
                      description: Optional profile display icon file upload (PNG/JPG)
      responses:
        '201':
          $ref: '#/components/responses/CategoryResponse'
        '400':
          $ref: '#/components/responses/badRequestError'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '403':
          $ref: '#/components/responses/forbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /categories/{id}:
    parameters:
      - $ref: '#/components/parameters/categoryIdPathParam'
    get:
      tags: [Categories]
      summary: Get a specific category (Admin Only)
      description: Fetches metadata for an isolated category item by scanning its database key identifier.
      responses:
        '200':
          $ref: '#/components/responses/CategoryResponse'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '403':
          $ref: '#/components/responses/forbiddenError'
        '404':
          $ref: '#/components/responses/notFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags: [Categories]
      summary: Update a category (Admin Only)
      description: Modifies existing category configurations. All payload parameters remain partial and completely optional.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/Category'
                - type: object
                  properties:
                    image:
                      type: string
                      format: binary
      responses:
        '200':
          $ref: '#/components/responses/CategoryResponse'
        '400':
          $ref: '#/components/responses/badRequestError'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '403':
          $ref: '#/components/responses/forbiddenError'
        '404':
          $ref: '#/components/responses/notFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Categories]
      summary: Delete a category (Admin Only)
      description: Permanently clears a category node entirely out of database memory indices.
      responses:
        '204':
          description: Category deleted successfully (No return body)
        '400':
          $ref: '#/components/responses/badRequestError'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '403':
          $ref: '#/components/responses/forbiddenError'
        '404':
          $ref: '#/components/responses/notFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  #--------------------------------------------------------------------------
  /wishlist:
    get:
      tags: [Wishlist]
      summary: Get current user's wishlist
      description: Retrieves the list of products saved in the logged-in user's wishlist.
      responses:
        '200':
          description: Wishlist retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  result:
                    type: integer
                    example: 1
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          example: 6a2e73d56cff973b1bee2362
                        title:
                          type: string
                          example: iPhone 13 Pro
                        description:
                          type: string
                          example: The iPhone 13 Pro is a cutting-edge smartphone with a powerful camera system
                        price:
                          type: number
                          example: 54449.99
                        imageCover:
                          type: string
                          example: products-6a2e73d56cff973b1bee2362-1782233992623-cover.jpeg
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /wishlist/{productId}:
    parameters:
      - $ref: '#/components/parameters/productIdPathParam'
    post:
      tags: [Wishlist]
      summary: Add a product to wishlist
      description: Adds a product ID to the user's wishlist array.
      responses:
        '200':
          description: Product added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: string
                      example: 6a2e73d56cff973b1bee2362
        '404':
          $ref: '#/components/responses/notFoundError'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Wishlist]
      summary: Remove a product from wishlist
      description: Removes a specific product ID from the user's wishlist array.
      responses:
        '204':
          description: Product removed successfully
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '404':
          $ref: '#/components/responses/notFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  #--------------------------------------------------------------------------
  /cart:
    get:
      tags: [Cart]
      summary: Retrieve the logged-in user's cart
      description: Fetches the active shopping cart and populates product details for the current authenticated session.
      responses:
        '200':
          description: Cart data fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  data:
                    $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '404':
          $ref: '#/components/responses/notFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Cart]
      summary: Add an item or update its quantity in the cart
      description: If the product does not exist in the cart, it inserts it. If it already exists, it updates or increments the quantity.
      requestBody:
        required: true
        content:
          application/json: # <--- Cart mutations use standard JSON, not multipart/form-data
            schema:
              type: object
              properties:
                productId:
                  type: string
                  example: '6a415f7b2ad8438f1374b556'
                quantity:
                  type: integer
                  minimum: 1
                  default: 1
                  description: Number of items to place in the cart
                  example: 2
              required: [productId]
      responses:
        '200':
          description: Product successfully added/updated in the cart
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  data:
                    $ref: '#/components/schemas/Cart'
        '400':
          $ref: '#/components/responses/badRequestError'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /cart/{productId}:
    parameters:
      - $ref: '#/components/parameters/productIdPathParam'
    patch:
      tags: [Cart]
      summary: Update the quantity of a specific item in the cart
      description: Directly overwrites the quantity of an existing item in the cart.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  minimum: 1
                  description: The new absolute quantity for this product line item
                  example: 3
              required: [quantity]
      responses:
        '200':
          description: Item quantity updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  data:
                    allOf:
                      - $ref: '#/components/schemas/Cart'
                      - type: object
                        properties:
                          cartItems:
                            type: array
                            items:
                              type: object
                              properties:
                                product:
                                  {
                                    $ref: '#/components/schemas/Product/properties/_id',
                                  }
                                quantity:
                                  type: integer
                                  minimum: 1
                                  example: 3
                                price:
                                  type: number
                                  description: Total price for this line item (product price * quantity)
                                  example: 1200
                          subTotal: { type: number, example: 3800 }
                          totalPrice: { type: number, example: 3780 }
        '400':
          $ref: '#/components/responses/badRequestError'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '404':
          $ref: '#/components/responses/notFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Cart]
      summary: Remove a specific line item from the cart
      description: Completely removes the product item line from the user's cart array.
      responses:
        '200':
          description: Item removed from cart successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  data:
                    allOf:
                      - $ref: '#/components/schemas/Cart'
                      - type: object
                        properties:
                          cartItems: { type: array, example: [] }
                          subTotal: { type: number, example: 0 }
                          totalPrice: { type: number, example: 0 }
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '404':
          $ref: '#/components/responses/notFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /cart/apply-coupon:
    patch:
      tags: [Cart]
      summary: Apply a discount coupon code to the cart
      description: Validates a coupon code string and applies the corresponding percentage or fixed discount to the cart total price.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                coupon:
                  type: string
                  description: The case-sensitive coupon name or promotional code
                  example: 'SUMMER20'
              required: [coupon]
      responses:
        '200':
          description: Coupon applied successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/unauthorizedError'
        '404':
          $ref: '#/components/responses/notFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  #--------------------------------------------------------------------------
