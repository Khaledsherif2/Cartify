#--------------------------------------------------------------------------
components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          readOnly: true
        name: { type: string }
        email:
          type: string
          format: email
        photo: { type: string }
        role:
          type: string
          enum: ['user', 'admin']
          readOnly: true
        password:
          type: string
          format: password
          minLength: 8
          writeOnly: true
        passwordConfirm:
          type: string
          format: password
          minLength: 8
          writeOnly: true
          description: Must exactly match the value provided in the password field
        wishlist:
          type: array
          items:
            type: string
          readOnly: true
      required: [name, email]

    Product:
      type: object
      properties:
        _id:
          type: string
          readOnly: true
          example: 6a415f7b2ad8438f1374b556
        title: { type: string }
        description: { type: string }
        price:
          type: number
          format: float
        category: { type: string }
        ratingsAverage:
          type: string
          readOnly: true
        ratingsQuantity:
          type: string
          readOnly: true
        imageCover: { type: string }
        images:
          type: array
          description: List of additional product image filenames
          items:
            type: string
        stock: { type: integer }
        status:
          type: string
          enum: [active, disable, sold out]
          example: active

    Category:
      type: object
      properties:
        _id:
          type: string
          readOnly: true
        name:
          type: string
          description: Unique identifying name for the category classification
          minLength: 2
          maxLength: 50
          example: 'Laptops'
        slug:
          type: string
          readOnly: true
          description: URL-friendly lowercased slug autogenerated from the name field
          example: 'laptops'
        image:
          type: string
          nullable: true
          description: Filename string pointing to the uploaded image resource saved on disk
          example: 'category-1782669179722.jpeg'
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
      required: [name]

    Cart:
      type: object
      properties:
        _id: { type: string, example: '6a521e4b8ef2c1145b23d911' }
        user: { type: string, example: '6a29d03c012df4d358f633e6' }
        cartItems:
          type: array
          items:
            type: object
            properties:
              product: { $ref: '#/components/schemas/Product/properties/_id' }
              quantity:
                type: integer
                minimum: 1
                example: 2
              price:
                type: number
                description: Total price for this line item (product price * quantity)
                example: 1200
              addedAt:
                { type: string, example: '2026-06-21T19:04:41.687+00:00' }
        appliedCoupon: { type: string, example: 'SUMMER20' }
        subTotal: { type: number, example: '2400', readOnly: true }
        totalPrice: { type: number, example: '2380', readOnly: true }

    Coupon:
      type: object
      properties:
        _id:
          type: string
          readOnly: true
        name:
          type: string
          description: The promotional code string
          example: 'SUMMER20'
        discount:
          type: integer
          description: Percentage value of the discount (1 to 100)
          minimum: 1
          maximum: 100
          example: 20
        type:
          type: string
          enum: [percentage, fixed]
        expireAt:
          type: string
          format: date-time
          description: The date and time when this coupon becomes invalid
          example: '2026-12-31T23:59:59.000Z'
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    Order:
      type: object
      properties:
        _id: { type: string, readOnly: true }
        user:
          { type: string, readOnly: true, example: '6a29d03c012df4d358f633e6' }
        OrderItems:
          type: array
          items:
            type: object
            properties:
              product:
                type: string
                description: The unique MongoDB product ID
                example: '6a415f7b2ad8438f1374b556'
              quantity: { type: integer, example: 2 }
              price: { type: number, example: 69099.99 }
        shippingAddress:
          type: object
          properties:
            city: { type: string, example: 'Cairo' }
            street: { type: string, example: '123 Main St, Apt 4B' }
            phone: { type: string, example: '+201234567890' }
        paymentMethod:
          type: string
          enum: [cash on delivery, paymob]
          example: cash on delivery
        totalOrderPrice: { type: number, readOnly: true, example: 138199.98 }
        isPaid: { type: boolean, readOnly: true, example: false }
        isDelivered: { type: boolean, readOnly: true, example: false }
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
          example: processing
        createdAt: { type: string, format: date-time, readOnly: true }

    Review:
      type: object
      properties:
        _id: { type: string, readOnly: true }
        review:
          type: string
          description: The text content of the review
          example: 'Excellent product! Highly recommend the performance.'
        rating:
          type: number
          minimum: 1
          maximum: 5
          description: Rating score from 1 to 5 stars
          example: 5
        user:
          type: string
          readOnly: true
          description: The MongoDB ID of the user who wrote the review
          example: '6a29d03c012df4d358f633e6'
        product:
          type: string
          description: The MongoDB ID of the product being reviewed
          example: '6a415f7b2ad8438f1374b556'
        createdAt: { type: string, format: date-time, readOnly: true }
        updatedAt: { type: string, format: date-time, readOnly: true }
      required: [review, rating, product]
  #--------------------------------------------------------------------------
  parameters:
    productIdPathParam:
      name: productId
      in: path
      required: true
      description: The unique ID of the product inside the cart line item
      schema:
        type: string
        example: '6a415f7b2ad8438f1374b556'

    couponIdPathParam:
      name: couponId
      in: path
      required: true
      description: The unique MongoDB ID of the coupon
      schema:
        type: string
        example: '6a512c9b4fd85e12a817399c'

    orderIdPathParam:
      name: orderId
      in: path
      required: true
      description: The unique MongoDB ID of the order
      schema:
        type: string
        example: '6a512c9b4fd85e12a817399c'

    reviewIdPathParam:
      name: reviewId
      in: path
      required: true
      description: The unique MongoDB ID of the review
      schema:
        type: string
        example: '6a621d8b4fd93e15b817422f'

    categoryIdPathParam:
      name: id
      in: path
      required: true
      description: The unique MongoDB ID of the category
      schema:
        type: string
        example: '6a621d8b4fd93e15b817422f'
  #--------------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  #--------------------------------------------------------------------------
  examples:
    OneUserExample:
      value:
        status: 'success'
        data: &baseUser
          _id: '6a29d03c012df4d358f633e6'
          name: 'khaled'
          email: 'user@cartify.io'
          photo: 'user-6a29d03c012df4d358f633e6.jpeg'
          role: 'user'
          wishlist: ['6a2ec5c95cb28fc3b9cb9d88']
          createdAt: '2026-06-10T20:59:40.532Z'
          updatedAt: '2026-06-29T08:29:39.136Z'

    AllUsersExample:
      value:
        status: 'success'
        result: 2
        data:
          - *baseUser
          - *baseUser

    loginExample:
      value:
        status: 'success'
