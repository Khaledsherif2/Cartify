    DashboardOverviewResponse:
      description: Success data overview retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, example: success }
              data:
                type: object
                properties:
                  totalUsers: { type: integer, example: 1450 }
                  product:
                    type: object
                    properties:
                      total: { type: integer, example: 350 }
                      active: { type: integer, example: 320 }
                      outOfStock: { type: integer, example: 30 }
                  orders:
                    type: object
                    properties:
                      total: { type: integer, example: 1200 }
                      revenue: { type: number, example: 85450.50 }
                      breakdown:
                        type: object
                        properties:
                          pending: { type: integer, example: 15 }
                          processing: { type: integer, example: 45 }
                          shipped: { type: integer, example: 20 }
                          completed: { type: integer, example: 1100 }
                          cancelled: { type: integer, example: 20 }

    MonthlySalesResponse:
      description: Success timeline sales metrics distribution
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, example: success }
              data:
                type: array
                items:
                  type: object
                  properties:
                    month: { type: string, example: 'January' }
                    salesCount: { type: integer, example: 140 }
                    revenue: { type: number, example: 12400.99 }

    OrderStatusResponse:
      description: Success status proportions data list
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, example: success }
              data:
                type: array
                items:
                  type: object
                  properties:
                    status: { type: string, example: 'delivered' }
                    count: { type: integer, example: 1100 }
                    percentage: { type: number, example: 91.6 }

    CategoryResponse:
      description: Success - Category data packet retrieved.
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, example: success }
              data:
                $ref: '#/components/schemas/Category'

    CategoryListResponse:
      description: Success - Collection array list of all categories.
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, example: success }
              results: { type: integer, example: 12 }
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
